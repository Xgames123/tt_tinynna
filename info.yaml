# Tiny Tapeout project information
project:
  title:        "Custom 8 bit processor (nna8v2)"      # Project title
  author:       "Xgames123"      # Your name
  discord:      "ldev105"        # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "No Name Architecture 8 bit Version 2"
  language:     "Verilog"      # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     66000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_xgames123_nna8v2"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "GPI 0"
  ui[1]: "GPI 1"
  ui[2]: "GPI 2"
  ui[3]: "GPI 3"
  ui[4]: "GPI 4"
  ui[5]: ""
  ui[6]: "SPI MISO"
  ui[7]: "UART RX"

  # Outputs
  uo[0]: "GPO 0"
  uo[1]: "GPO 1"
  uo[2]: "GPO 2"
  uo[3]: "GPO 3"
  uo[4]: "GPO 4"
  uo[5]: "SPI SCK"
  uo[6]: "SPI MOSI"
  uo[7]: "UART TX"

  # Bidirectional pins
  uio[0]: "CS0 (Flash)"
  uio[1]: "SD0/MOSI"
  uio[2]: "SD1/MISO"
  uio[3]: "SCK" # By modification of the QSPI PCB this pin becomes available
  uio[4]: "SD2"
  uio[5]: "SD3"
  uio[6]: "CS1 (RAM A)"
  uio[7]: "CS2 (RAM B)"

# Do not change!
yaml_version: 6
